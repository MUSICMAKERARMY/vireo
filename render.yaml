services:
  - type: web
    name: vireo-api
    env: node
    rootDir: vireo-complete/backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        from: 
          type: postgresql
          name: vireo-db
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: "*"

databases:
  - name: vireo-db
    plan: free